name: test
on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra tutorial --extra dev
      - name: lint
        run: uv run make lint
      - name: unit-tests
        run: uv run make test
      - name: gks-validation
        run: uv run make verify-data
      - name: notebooks
        run: uv run make notebooks
      - name: colab-requirements
        run: uv run make colab-requirements
      - name: package-build
        run: uv run make build

  colab-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m venv /tmp/gks-colab-smoke
      - name: install-colab-requirements
        run: |
          /tmp/gks-colab-smoke/bin/python -m pip install \
            --requirement requirements-colab.txt
          /tmp/gks-colab-smoke/bin/python -m pip install --no-deps .
          /tmp/gks-colab-smoke/bin/python -m pip check
      - name: execute-notebook-pairs
        run: |
          for notebook in notebooks/*.py; do
            /tmp/gks-colab-smoke/bin/python "$notebook"
          done

name: data-integrity
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/**"
      - "scripts/verify_data.py"
      - "src/gks_tutorial/manifests.py"
      - "src/gks_tutorial/gks_models.py"
      - "tests/test_clinvar.py"
      - "tests/test_clinvar_gks.py"
      - "tests/test_data_manifest.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - name: verify-manifest-and-objects
        run: uv run make verify-data
      - name: fixture-tests
        run: >-
          uv run pytest tests/test_clinvar.py tests/test_clinvar_gks.py
          tests/test_data_manifest.py

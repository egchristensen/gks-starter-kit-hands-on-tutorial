name: data-integrity
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/**"
      - "scripts/verify_data.py"
      - "src/gks_tutorial/manifests.py"

jobs:
  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev
      - run: uv run make verify-data
